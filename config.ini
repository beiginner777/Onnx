# ============================================================
# ONNX Inference Server — Configuration
# ============================================================

[server]
# HTTP 服务端口
port = 8080
# IO 线程数（0 = 自动检测 hardware_concurrency）
num_threads = 0

[model]
# 模型文件存放目录
path = ./models
# 输入张量最大字节数（10MB），防止 OOM
max_input_bytes = 10485760

[batch]
# 最大批处理大小
max_batch_size = 32
# 批处理超时（毫秒）：距第一条请求超过此时间即触发
batch_timeout_ms = 10
# 饥饿保护超时（毫秒）：单请求等待超过此时间强制触发
starvation_timeout_ms = 100

[log]
# 日志级别: trace, debug, info, warn, error, critical
level = info
